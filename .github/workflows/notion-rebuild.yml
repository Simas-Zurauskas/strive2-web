# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: 'Knowledge Base: Rebuild'

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install script dependencies
        working-directory: .github/scripts
        run: npm install

      - name: Fetch Notion documentation
        working-directory: .github/scripts
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_TECHNICAL_ROOT_ID: ${{ secrets.NOTION_TECHNICAL_ROOT_ID }}
        run: node fetch-notion-docs.js

      - name: Generate codebase manifest
        run: |
          {
            echo "# Codebase Manifest"
            echo ""
            echo "## All TypeScript/TSX files"
            echo '```'
            find src -type f \( -name "*.ts" -o -name "*.tsx" \) | grep -v '_generated' | sort
            echo '```'
            echo ""
            echo "## Directory tree (depth 3)"
            echo '```'
            find src -type d -maxdepth 3 | sort
            echo '```'
            echo ""
            echo "## Barrel files (index.ts)"
            echo '```'
            find src -name "index.ts" -o -name "index.tsx" | sort
            echo '```'
            echo ""
            echo "## Config files"
            echo '```'
            ls -la next.config.* tsconfig.json package.json 2>/dev/null
            echo '```'
          } > _manifest.md
          echo "Manifest generated: $(wc -l < _manifest.md) lines"

      - name: Rebuild documentation
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          display_report: true
          claude_args: "--max-turns 200 --model claude-sonnet-4-20250514 --allowedTools 'Read,Glob,Grep,Bash(*)'"
          prompt: |
            You are a technical documentation engine. Your job: audit the Client codebase
            against its Notion documentation and execute all necessary updates — rewrites,
            creates, deletes — until the wiki is fully accurate and complete.

            ## Project context

            Strive is an AI-powered learning platform with two repositories:
            - **API** (Express 5, Node 22, MongoDB, LangGraph) — NOT available here
            - **Client** (Next.js 16, React 19, styled-components, NextAuth) — THIS repo

            They communicate via REST (OpenAPI, codegen types) and WebSocket (Socket.IO).

            ## Documentation philosophy

            This wiki serves developers and AI agents. Every page must earn its place.
            Document architecture decisions, data flows, integration points, gotchas, and
            configuration. Do not restate obvious code. Cross-repo concerns (auth, data
            contracts, WebSocket events) are first-class topics.

            ## Available tools

            ### Reading

            **Codebase manifest** (pre-generated):
            - `_manifest.md` — complete file listing, directory tree, barrel files. READ THIS FIRST.

            **Current documentation** (fetched from Notion):
            - `_docs/_index.json` — page tree with Notion page IDs
            - `_docs/**/*.md` — page content as markdown

            **Source code** — use Read, Glob, Grep:
            - `Glob("src/**/*.ts")` or `Glob("src/hooks/**/*.tsx")` — ALWAYS use wildcards
            - `Grep("useAuth", type="ts")` — find usage across codebase
            - `Read` — read specific files. Batch 3-5 parallel Read calls per turn.
            - Skip `src/api/_generated.ts` (auto-generated)

            **WRONG tool usage** (wastes turns):
            - `Glob("src")` or `Glob("src/hooks")` — matches nothing without wildcards
            - Reading files one at a time — always batch parallel reads
            - Using Read to list directories — use `Bash("ls src/screens/")` instead

            ### Writing to Notion

            Write markdown to a temp file, then call notion-tool.js:

            ```bash
            # List all pages with IDs
            NOTION_API_KEY="${{ secrets.NOTION_API_KEY }}" NOTION_TECHNICAL_ROOT_ID="${{ secrets.NOTION_TECHNICAL_ROOT_ID }}" node .github/scripts/notion-tool.js list

            # Replace entire page content
            NOTION_API_KEY="${{ secrets.NOTION_API_KEY }}" node .github/scripts/notion-tool.js rewrite <page_id> /tmp/content.md

            # Append content to page
            NOTION_API_KEY="${{ secrets.NOTION_API_KEY }}" node .github/scripts/notion-tool.js append <page_id> /tmp/content.md

            # Create new child page
            NOTION_API_KEY="${{ secrets.NOTION_API_KEY }}" NOTION_TECHNICAL_ROOT_ID="${{ secrets.NOTION_TECHNICAL_ROOT_ID }}" node .github/scripts/notion-tool.js create <parent_id> "Page Title" /tmp/content.md

            # Archive (delete) a page
            NOTION_API_KEY="${{ secrets.NOTION_API_KEY }}" node .github/scripts/notion-tool.js delete <page_id>

            # Rename a page
            NOTION_API_KEY="${{ secrets.NOTION_API_KEY }}" node .github/scripts/notion-tool.js rename <page_id> "New Title"
            ```

            The tool converts markdown to Notion blocks. Supports: headings, bullet/numbered
            lists, code blocks, tables (GFM), blockquotes, dividers, inline formatting
            (bold, italic, code, links).

            ---

            ## Process — follow these phases strictly

            ### Phase 1: Map (2-3 turns max)

            1. Read `_manifest.md` and `_docs/_index.json` in parallel.
            2. Read ALL doc files from `_docs/` in batches of 4-5 per turn.
            3. You now have the full picture: every source file path and every doc page.

            ### Phase 2: Verify (bulk of your work)

            For each documentation page, verify every claim against the source code:

            1. **Read the doc page** (already done in Phase 1)
            2. **Read the corresponding source files** — batch 3-5 per turn
            3. **Check every claim**: file paths, component names, props, hook signatures,
               route functions, theme tokens, CSS variables, provider hierarchy, auth flow,
               codegen pipeline. Every claim must match the code.
            4. **Note discrepancies**: wrong paths, missing components, outdated behavior,
               new code without docs

            Areas to verify systematically:
            - `src/app/` — routes, layouts, page files, middleware
            - `src/screens/` — all screen components
            - `src/components/` — shared UI components, props, variants
            - `src/hooks/` — custom hooks, signatures, return types
            - `src/api/` — route functions, client config, interceptors
            - `src/validation/` — Yup schemas
            - `src/app/_registry/` — provider hierarchy
            - `src/middleware.ts` — edge middleware config
            - `src/theme/` — design tokens, CSS variables, color system
            - `next.config.*`, `package.json` — build config, codegen

            ### Phase 3: Plan

            Before making ANY changes, write out your complete plan as a message.
            For each documentation page, decide:
            - **rewrite** — significantly wrong or outdated, needs fresh content
            - **append** — mostly accurate but missing new content
            - **create** — codebase has a concept with no documentation page
            - **delete** — documents something that no longer exists
            - **rename** — title is wrong or misleading
            - **accurate** — checks out, no changes needed

            Prioritize: critical inaccuracies > missing core docs > minor updates.

            ### Phase 4: Execute

            Work through the plan. For each change:
            1. Write complete markdown content to `/tmp/<page_name>.md`
            2. Call the appropriate notion-tool.js command
            3. Verify it succeeded (check output for ✓)

            When rewriting, write the COMPLETE page — not just changed sections.

            ### Documentation page structure

            Each page should include (where applicable):
            - **Purpose** — one paragraph on what this covers and why
            - **How it works** — core technical content, architecture
            - **Key files** — table of file paths with descriptions
            - **Integration points** — connections to other systems
            - **Configuration** — env vars, feature flags
            - **Gotchas** — non-obvious behavior, limitations

            ### Writing standards

            - Present tense, third person ("The component accepts…")
            - Name specific files, components, hooks, endpoints
            - Dense and precise — every sentence carries information
            - Use code blocks for paths, component names, env vars
            - Use tables for structured data (props, routes, env vars)
            - Technical, direct, professional tone

            ### Quality criteria (every page must pass all three)

            **COMPLETE**: All public functions, hooks, components, routes documented.
            No significant code exists without documentation.

            **HELPFUL**: Explains why, not just what. Includes gotchas, integration
            points, and context a new developer needs.

            **TRUTHFUL**: Every file path, function name, prop, and behavior claim
            matches the code exactly. If you haven't verified a claim by reading the
            source file, do not write it.

            ## Rules

            - Every finding must cite specific file paths
            - Actually read and verify every file — never assume
            - When rewriting a page, write COMPLETE content
            - Do not create pages for trivial things
            - Maintain the existing page hierarchy unless there's a clear problem
            - For cross-repo pages (auth, type pipeline), only update client-side claims
            - Do not guess about API-side behavior
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_TECHNICAL_ROOT_ID: ${{ secrets.NOTION_TECHNICAL_ROOT_ID }}
