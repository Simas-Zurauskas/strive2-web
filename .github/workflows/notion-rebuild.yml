# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: 'Knowledge Base: Rebuild'

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install script dependencies
        working-directory: .github/scripts
        run: npm install

      - name: Fetch Notion documentation
        working-directory: .github/scripts
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_TECHNICAL_ROOT_ID: ${{ secrets.NOTION_TECHNICAL_ROOT_ID }}
        run: node fetch-notion-docs.js

      - name: Generate codebase manifest
        run: |
          {
            echo "# Codebase Manifest"
            echo ""
            echo "## All TypeScript/TSX files"
            echo '```'
            find src -type f \( -name "*.ts" -o -name "*.tsx" \) | grep -v '_generated' | sort
            echo '```'
            echo ""
            echo "## Directory tree (depth 3)"
            echo '```'
            find src -type d -maxdepth 3 | sort
            echo '```'
            echo ""
            echo "## Barrel files (index.ts)"
            echo '```'
            find src -name "index.ts" -o -name "index.tsx" | sort
            echo '```'
            echo ""
            echo "## Config files"
            echo '```'
            ls -la next.config.* tsconfig.json package.json 2>/dev/null
            echo '```'
          } > _manifest.md
          echo "Manifest generated: $(wc -l < _manifest.md) lines"

      - name: Concatenate all documentation into single file
        run: |
          {
            echo "# All Documentation Pages"
            echo ""
            echo "This file contains every Notion documentation page concatenated."
            echo "Use _docs/_index.json for page IDs when writing back to Notion."
            echo ""
            for f in $(find _docs -name "*.md" | sort); do
              echo "---"
              echo ""
              echo "<!-- SOURCE: $f -->"
              echo ""
              cat "$f"
              echo ""
              echo ""
            done
          } > _docs_all.md
          echo "Docs bundle: $(wc -l < _docs_all.md) lines, $(wc -c < _docs_all.md | tr -d ' ') bytes"

      - name: Rebuild documentation
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          display_report: true
          claude_args: "--max-turns 200 --model claude-sonnet-4-20250514 --allowedTools 'Read,Glob,Grep,Bash(*)'"
          prompt: |
            You are a technical documentation engine. Your job: make the Notion technical
            wiki fully match the codebase — whether that means writing documentation from
            scratch, restructuring pages as the project grows, or auditing existing content.

            ## Project context

            Strive is an AI-powered learning platform with two repositories:
            - **API** (Express 5, Node 22, MongoDB, LangGraph) — NOT available here
            - **Client** (Next.js 16, React 19, styled-components, NextAuth) — THIS repo

            They communicate via REST (OpenAPI, codegen types) and WebSocket (Socket.IO).

            ## Documentation philosophy

            This wiki serves developers and AI agents. Every page must earn its place.
            Document architecture decisions, data flows, integration points, gotchas, and
            configuration. Do not restate obvious code. Cross-repo concerns (auth, data
            contracts, WebSocket events) are first-class topics.

            ## Available tools

            ### Reading

            **Pre-generated files (read these first — they save you dozens of turns):**
            - `_manifest.md` — complete source file listing, directory tree, barrel files
            - `_docs_all.md` — ALL documentation pages concatenated into one file.
              Each page is separated by `<!-- SOURCE: _docs/path/to/Page.md -->` markers.
            - `_docs/_index.json` — page tree with Notion page IDs (needed for write operations)

            **IMPORTANT: Start by reading `_manifest.md`, `_docs_all.md`, and `_docs/_index.json`
            in your first turn. This gives you the entire codebase map and all documentation
            in 3 reads instead of 20+.**

            **Source code** — use Read, Glob, Grep:
            - `Glob("src/**/*.ts")` or `Glob("src/hooks/**/*.tsx")` — ALWAYS use wildcards
            - `Grep("useAuth", type="ts")` — find usage across codebase
            - `Read` — read specific files. Batch 3-5 parallel Read calls per turn.
            - Skip `src/api/_generated.ts` (auto-generated)

            **WRONG tool usage** (wastes turns):
            - `Glob("src")` or `Glob("src/hooks")` — matches nothing without wildcards
            - Reading doc files one at a time — use `_docs_all.md` instead
            - Using Read to list directories — use `Bash("ls src/screens/")` instead

            ### Writing to Notion

            Write markdown to a temp file, then call notion-tool.js:

            ```bash
            # List all pages with IDs
            NOTION_API_KEY="${{ secrets.NOTION_API_KEY }}" NOTION_TECHNICAL_ROOT_ID="${{ secrets.NOTION_TECHNICAL_ROOT_ID }}" node .github/scripts/notion-tool.js list

            # Replace entire page content
            NOTION_API_KEY="${{ secrets.NOTION_API_KEY }}" node .github/scripts/notion-tool.js rewrite <page_id> /tmp/content.md

            # Append content to page
            NOTION_API_KEY="${{ secrets.NOTION_API_KEY }}" node .github/scripts/notion-tool.js append <page_id> /tmp/content.md

            # Create new child page
            NOTION_API_KEY="${{ secrets.NOTION_API_KEY }}" NOTION_TECHNICAL_ROOT_ID="${{ secrets.NOTION_TECHNICAL_ROOT_ID }}" node .github/scripts/notion-tool.js create <parent_id> "Page Title" /tmp/content.md

            # Archive (delete) a page
            NOTION_API_KEY="${{ secrets.NOTION_API_KEY }}" node .github/scripts/notion-tool.js delete <page_id>

            # Rename a page
            NOTION_API_KEY="${{ secrets.NOTION_API_KEY }}" node .github/scripts/notion-tool.js rename <page_id> "New Title"
            ```

            The tool converts markdown to Notion blocks. Supports: headings, bullet/numbered
            lists, code blocks, tables (GFM), blockquotes, dividers, inline formatting
            (bold, italic, code, links).

            ---

            ## Process — follow these phases strictly

            ### Phase 1: Map (1-2 turns)

            1. Read `_manifest.md`, `_docs_all.md`, and `_docs/_index.json` in parallel (one turn).
            2. You now have the full picture: every source file path, every doc page's content,
               and every Notion page ID. Do NOT read individual `_docs/*.md` files.

            ### Phase 2: Understand the codebase

            Read the source files systematically. Batch 3-5 parallel reads per turn.

            Areas to cover:
            - `src/app/` — routes, layouts, page files, middleware
            - `src/screens/` — all screen components
            - `src/components/` — shared UI components, props, variants
            - `src/hooks/` — custom hooks, signatures, return types
            - `src/api/` — route functions, client config, interceptors
            - `src/validation/` — Yup schemas
            - `src/app/_registry/` — provider hierarchy
            - `src/middleware.ts` — edge middleware config
            - `src/theme/` or `src/styles/` — design tokens, CSS variables, color system
            - `next.config.*`, `package.json` — build config, codegen

            For each area: understand what exists, then compare against documentation.
            Note what's missing, wrong, outdated, or undocumented.

            ### Phase 3: Plan

            Before making ANY changes, write out your complete plan as a message.

            First, determine the documentation state:
            - **Bootstrap** — `_docs_all.md` is empty or nearly empty. No pages exist.
              Design the full page hierarchy from scratch based on what the codebase contains.
            - **Growth** — Pages exist but the codebase has outgrown them. New areas need
              new pages, large pages need splitting into subpages.
            - **Maintenance** — Pages exist and roughly match. Audit for accuracy, fix drift.

            These aren't mutually exclusive — a single run may bootstrap missing sections,
            split overgrown pages, and fix inaccuracies on others.

            For each documentation page (existing or to-be-created), decide:
            - **rewrite** — page exists but content is significantly wrong or outdated
            - **append** — page is mostly accurate but missing new content
            - **create** — codebase area has no corresponding documentation page
            - **split** — page covers too many concerns or has grown too large.
              Create child pages under it, move content into children, rewrite the
              parent as an index page linking to its children.
            - **delete** — page documents something that no longer exists
            - **rename** — title is wrong or misleading
            - **accurate** — page checks out, no changes needed

            **When to split a page:**
            - It covers 3+ unrelated subsystems (e.g., auth + theme + middleware)
            - It has 6+ top-level sections that could each stand alone
            - A new feature was added that deserves its own focused page

            **When to create a new page:**
            - A `src/` directory or subsystem has no documentation at all
            - A cross-cutting concern (auth, WebSocket, codegen) isn't documented
            - The codebase has a pattern used everywhere but never explained

            **Hierarchy rules for new pages:**
            - Client-specific pages go under the Client section
            - System-wide concerns (auth, type pipeline, conventions) go at root level
            - When creating child pages, create the parent first, capture its ID from
              the tool output, then create children under that ID

            Prioritize: missing pages for major features > inaccurate content >
            structural improvements > minor updates.

            ### Phase 4: Execute

            Work through the plan. For each change:
            1. Write complete markdown content to `/tmp/<page_name>.md`
            2. Call the appropriate notion-tool.js command
            3. Verify it succeeded (check output for ✓)

            **For splits:** Create child pages first (capture their IDs from output),
            then rewrite the parent page as an index that describes the section and
            lists its child pages.

            **For bootstrap (creating hierarchy from scratch):** Create top-level section
            pages first (e.g., "Client"), then create child pages under them. Work
            top-down through the hierarchy.

            When rewriting or creating, write the COMPLETE page — not stubs or partial content.

            ### Documentation page structure

            Each page should include (where applicable):
            - **Purpose** — one paragraph on what this covers and why
            - **How it works** — core technical content, architecture
            - **Key files** — table of file paths with descriptions
            - **Integration points** — connections to other systems
            - **Configuration** — env vars, feature flags
            - **Gotchas** — non-obvious behavior, limitations

            ### Writing standards

            - Present tense, third person ("The component accepts…")
            - Name specific files, components, hooks, endpoints
            - Dense and precise — every sentence carries information
            - Use code blocks for paths, component names, env vars
            - Use tables for structured data (props, routes, env vars)
            - Technical, direct, professional tone

            ### Quality criteria (every page must pass all three)

            **COMPLETE**: All public functions, hooks, components, routes documented.
            No significant code exists without documentation.

            **HELPFUL**: Explains why, not just what. Includes gotchas, integration
            points, and context a new developer needs.

            **TRUTHFUL**: Every file path, function name, prop, and behavior claim
            matches the code exactly. If you haven't verified a claim by reading the
            source file, do not write it.

            ## Rules

            - Every finding must cite specific file paths
            - Actually read and verify every file — never assume
            - When rewriting or creating a page, write COMPLETE content — not stubs
            - Do not create pages for trivial things (one utility function, one config file)
            - Restructure the hierarchy when the codebase demands it — don't preserve
              a structure that no longer fits the project
            - For cross-repo pages (auth, type pipeline), only update client-side claims
            - Do not guess about API-side behavior
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_TECHNICAL_ROOT_ID: ${{ secrets.NOTION_TECHNICAL_ROOT_ID }}
