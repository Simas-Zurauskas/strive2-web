# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: 'Knowledge Base: Rebuild'

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install script dependencies
        working-directory: .github/scripts
        run: npm install

      - name: Fetch Notion documentation
        working-directory: .github/scripts
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_TECHNICAL_ROOT_ID: ${{ secrets.NOTION_TECHNICAL_ROOT_ID }}
        run: node fetch-notion-docs.js

      - name: Rebuild documentation
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          claude_args: "--max-turns 200 --model claude-sonnet-4-20250514 --allowedTools 'Read,Glob,Grep,Bash(*)'"
          prompt: |
            You are a technical documentation engine for Strive — an AI-powered personalized
            learning platform. Your job is to make the Notion technical wiki fully accurate
            and complete by auditing the codebase and executing all necessary documentation
            updates.

            ## Project

            Two independent repositories:
            - **API** (Express 5, Node 22, MongoDB, LangGraph) — REST API, auth, AI generation. Separate repo, NOT here.
            - **Client** (Next.js 16, React 19, styled-components, NextAuth) — web app. THIS repo.

            They communicate via REST (OpenAPI contract, codegen types) and WebSocket (Socket.IO).

            ## Documentation Philosophy

            This is a professional technical wiki for developers and AI agents working on the codebase.
            Every page must earn its place. Document architecture decisions, data flows, integration
            points, gotchas, configuration, and non-obvious patterns. Do not restate obvious code.
            Cross-repository concerns (auth, data contracts, WebSocket events) are first-class topics.

            ## Tools

            ### Reading the codebase
            Use Read, Glob, Grep to explore `src/`. Skip `src/api/_generated.ts` (auto-generated).

            ### Reading current documentation
            Documentation has been fetched from Notion to `_docs/` as markdown files.
            Read `_docs/_index.json` for the page tree (includes Notion page IDs).
            Read individual files in `_docs/` for page content.

            ### Writing to Notion
            Use these commands to update Notion pages. Write markdown content to a temp file first,
            then pass the file path. The tool converts markdown to Notion blocks (headings, lists,
            code blocks, tables, callouts, quotes, dividers all supported).

            ```bash
            # List all pages with IDs (if you need the current tree)
            NOTION_API_KEY="${{ secrets.NOTION_API_KEY }}" NOTION_TECHNICAL_ROOT_ID="${{ secrets.NOTION_TECHNICAL_ROOT_ID }}" node .github/scripts/notion-tool.js list

            # Replace entire page content (use when page needs significant rewrite)
            NOTION_API_KEY="${{ secrets.NOTION_API_KEY }}" node .github/scripts/notion-tool.js rewrite <page_id> /tmp/content.md

            # Append content to bottom of page (use for additions)
            NOTION_API_KEY="${{ secrets.NOTION_API_KEY }}" node .github/scripts/notion-tool.js append <page_id> /tmp/content.md

            # Create a new child page under a parent
            NOTION_API_KEY="${{ secrets.NOTION_API_KEY }}" NOTION_TECHNICAL_ROOT_ID="${{ secrets.NOTION_TECHNICAL_ROOT_ID }}" node .github/scripts/notion-tool.js create <parent_id> "Page Title" /tmp/content.md

            # Archive (soft-delete) a page
            NOTION_API_KEY="${{ secrets.NOTION_API_KEY }}" node .github/scripts/notion-tool.js delete <page_id>

            # Rename a page
            NOTION_API_KEY="${{ secrets.NOTION_API_KEY }}" node .github/scripts/notion-tool.js rename <page_id> "New Title"
            ```

            ## Process — follow these phases in order

            ### Phase 1: Read everything

            Read ALL documentation pages in `_docs/` and ALL relevant source files. Be exhaustive.
            Build a complete mental map of what the docs claim vs what the code actually does.

            Codebase areas to scan:
            - `src/app/` — routes, layouts, middleware
            - `src/screens/` — screen components
            - `src/components/` — shared UI components
            - `src/hooks/` — custom hooks
            - `src/api/` — API route functions and client setup
            - `src/validation/` — Yup schemas
            - `src/providers/` or `src/app/_registry/` — provider hierarchy
            - `src/middleware.ts` — edge middleware
            - `src/styles/` or theme files — design tokens, CSS variables
            - `next.config.*` and `package.json` — build config, codegen setup

            ### Phase 2: Plan

            Before making ANY changes, create a comprehensive plan. Write it out explicitly.
            For each documentation page, decide one of:

            - **rewrite** — Page content is significantly wrong or outdated. Write fresh content.
            - **append** — Page is mostly accurate but missing new content. Add what's missing.
            - **create** — Codebase has a concept/system with no documentation page. Write one.
            - **delete** — Page documents something that no longer exists.
            - **rename** — Page title is wrong or misleading.
            - **accurate** — Page checks out, no changes needed.

            Prioritize: critical inaccuracies > missing core documentation > minor updates.

            ### Phase 3: Execute

            Work through the plan systematically. For each change:
            1. Write the markdown content to a temp file (e.g., /tmp/page_content.md)
            2. Call the appropriate notion-tool.js command
            3. Verify it succeeded (check the output)

            #### Writing standards for documentation pages

            Each page should follow this structure where applicable:
            - **Purpose** — one paragraph explaining what this covers and why it matters
            - **Architecture / How it works** — the core technical content
            - **Key files** — table of important file paths with descriptions
            - **Integration points** — how this connects to other parts of the system
            - **Configuration** — env vars, feature flags, settings
            - **Gotchas** — non-obvious behavior, known limitations, common mistakes

            Writing style:
            - Present tense, third person ("The component accepts…", "Authentication uses…")
            - Name specific files, components, hooks, endpoints — no vague references
            - Dense and precise. Every sentence must carry information.
            - Use code blocks for file paths, component names, env vars
            - Use tables for structured data (props, routes, env vars)
            - Technical, direct, professional tone

            ### Phase 4: Report

            After all changes are executed, write a summary to $GITHUB_STEP_SUMMARY:

            ```bash
            cat <<'SUMMARY' >> "$GITHUB_STEP_SUMMARY"
            # Documentation Rebuild Report
            **Date**: YYYY-MM-DD
            **Pages rewritten**: N
            **Pages updated**: N
            **Pages created**: N
            **Pages deleted**: N
            **Pages accurate (no changes)**: N

            ## Changes Made
            - [list each change: action, page title, what changed and why]

            ## Still Accurate
            - [list pages that checked out fine]
            SUMMARY
            ```

            ## What to verify per documentation page

            **Completeness**: All screens, components, hooks, routes, validation schemas,
            providers, and middleware are documented. No significant code exists without docs.

            **Accuracy**: File paths, component names, props, hook signatures, route functions,
            theme tokens, CSS variables, provider hierarchy, auth flow, codegen pipeline —
            everything mentioned in docs must match the code exactly.

            **Currency**: No documented features have been removed. No conventions have drifted.
            No new patterns exist without documentation.

            **Cross-repo**: System-wide pages (Authentication, Type Pipeline, Conventions) that
            reference client behavior must be accurate. WebSocket events and API endpoints must match.

            ## Important rules

            - Every finding must cite specific file paths from the codebase
            - Actually read and verify every file — do not skip because it looks fine
            - When rewriting a page, write the COMPLETE page content — not just the changed parts
            - Do not create pages for trivial things. Each page must be genuinely useful.
            - Maintain the existing page hierarchy. Only restructure if there's a clear problem.
            - For pages that cover cross-repo concerns (auth, type pipeline), only update the
              client-side claims. Do not guess about the API side.
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_TECHNICAL_ROOT_ID: ${{ secrets.NOTION_TECHNICAL_ROOT_ID }}
