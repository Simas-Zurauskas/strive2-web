# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Documentation Audit

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install script dependencies
        working-directory: .github/scripts
        run: npm install

      - name: Fetch Notion documentation
        working-directory: .github/scripts
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_TECHNICAL_ROOT_ID: ${{ secrets.NOTION_TECHNICAL_ROOT_ID }}
        run: node fetch-notion-docs.js

      - name: Run documentation audit
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are a technical documentation auditor.

            ## Project

            Strive is an AI-powered personalized learning platform that generates structured,
            customized courses tailored to individual goals with AI-generated curricula, lessons,
            interactive assessments, and intelligent mentoring.

            The product is composed of independent repositories, each a standalone project:
            - **API** (Express 5, Node 22, MongoDB, LangGraph) — REST API, authentication, AI-powered course generation. Separate repo, NOT available here.
            - **Client** (Next.js 16, React 19, styled-components, NextAuth) — web application with course creation wizard, lesson viewer, AI chat. THIS is the client repo.

            They communicate via REST (OpenAPI contract, types generated via openapi-typescript codegen) and WebSocket (Socket.IO for async job lifecycle events).

            ## Documentation Philosophy

            This is a professional technical wiki — not auto-generated reference docs.
            Every section must earn its place. Documentation should cover what a developer
            or technical stakeholder genuinely needs: architecture decisions, data flows,
            integration points, gotchas, and configuration. It should not restate obvious code.

            Cross-repository concerns are first-class topics. Auth flows spanning repos,
            shared data contracts, API shapes, and WebSocket events must be explicitly
            documented — not buried inside a single repo's section.

            ## Your Task

            Perform a comprehensive audit of the Client codebase against its technical
            documentation. The documentation has been fetched from Notion to `_docs/` as
            markdown files.

            ### Process

            1. **Scan** — Read `_docs/_index.json` to understand the documentation structure.
               Then read every documentation page in `_docs/`. Build a mental map of what
               the docs claim the codebase looks like.

            2. **Verify** — For each documentation page, read the corresponding source files
               in `src/` and verify every claim. Check file paths, component names, props,
               hook signatures, route functions, provider hierarchy, middleware behavior,
               theme tokens, and conventions.

            3. **Discover** — Scan the codebase for anything NOT covered by documentation.
               New screens, components, hooks, API routes, validation schemas, or patterns
               that have no corresponding documentation.

            4. **Report** — Produce a structured, actionable report.

            ### What to Verify

            **Completeness**
            - All screens in `src/screens/` and routes in `src/app/` are documented
            - All components in `src/components/` are documented with their props and variants
            - All hooks in `src/hooks/` are documented with their return types and behavior
            - All API route modules in `src/api/routes/` are documented
            - All validation schemas in `src/validation/` are documented
            - The provider hierarchy in `src/app/_registry/` is documented and accurate
            - The edge middleware in `src/middleware.ts` is documented

            **Accuracy**
            - File paths mentioned in docs match actual file locations
            - Component names, props, variants, and behavior match the code
            - The auth flow description matches the actual NextAuth config and callbacks
            - API route function signatures and endpoints match documentation
            - Theme color tokens, CSS variables, and font setup match documentation
            - The type generation pipeline description matches the actual codegen setup
            - Convention docs match actual patterns used in the codebase

            **Currency**
            - No new files or patterns exist without documentation
            - No documented features have been removed from the code
            - No documented conventions have drifted from actual practice

            **Cross-repository accuracy**
            - System-wide docs (Authentication, Type Pipeline, Conventions) that reference
              client-side behavior are accurate
            - WebSocket event names and payloads match the code
            - API endpoint paths used in route functions match documentation

            ### Rules

            - Every finding MUST cite specific file paths from the codebase
            - Quote the relevant documentation text when reporting inaccuracies
            - Actually read and verify every file — do not skip because something looks fine
            - Skip `src/api/_generated.ts` (auto-generated, not documentation-relevant)
            - Structure must emerge from what you find, not from assumptions

            ## Output

            When the audit is complete, write the full report to $GITHUB_STEP_SUMMARY using a bash command.

            Use this structure (replace placeholders with real findings):

            ```markdown
            # Documentation Audit Report

            **Date**: YYYY-MM-DD
            **Repository**: Client (Next.js)
            **Scope**: Full codebase vs Notion Technical documentation

            ## Summary

            | Category | Count |
            |----------|-------|
            | Missing documentation | N |
            | Inaccurate content | N |
            | Stale references | N |
            | Undocumented code | N |

            ## Critical Issues
            Issues that could actively mislead a developer.

            ## Missing Documentation
            Code that exists with no corresponding documentation.

            ## Inaccurate Documentation
            Docs that describe behavior differently from the code.
            For each: quote the doc, cite the file, explain the discrepancy.

            ## Stale References
            File paths, component names, or patterns referenced in docs that no longer exist.

            ## Accurate Documentation
            Brief summary of what checks out — builds confidence in the audit.

            ## Recommendations
            Prioritized list of updates needed, most impactful first.
            For each: which Notion page, what section, what the fix is.
            ```
          claude_args: "--max-turns 30 --model claude-sonnet-4-20250514"
