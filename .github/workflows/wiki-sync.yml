# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: 'Wiki Sync'

# Calls the reusable wiki-sync workflow from notion-docs-agent.
# Setup, prerequisites, and required secrets are documented there.

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      regen_disabled:
        description: 'Skip verify+regen, sync existing wiki/ to Notion.'
        required: false
        type: boolean
        default: false

jobs:
  sync:
    uses: Simas-Zurauskas/notion-docs-agent/.github/workflows/wiki-sync.yml@master
    with:
      # Informational — actual per-page routing comes from wiki/.notion-map.json.
      notion_root_id: 336c2628-ef95-81bf-8806-d8b738a2d8eb
      regen_disabled: ${{ inputs.regen_disabled || false }}
    secrets: inherit
